  #   environment:
  #     POSTGRES_USER: prediction_market
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #     POSTGRES_DB: prediction_market
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U prediction_market"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

volumes:
  redis_data:
