version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: prediction_market_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional: Uncomment for Phase 4 when adding Postgres support
  # postgres:
