[pytest]
# Pytest configuration for prediction market trading system tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Markers for test categorization
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    slow: marks tests as slow (deselect with '-m "not slow"')
    market_data: tests involving market data
    risk: tests involving risk management
    execution: tests involving order execution

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (if using pytest-cov)
# addopts = --cov=prediction_market --cov-report=html

# Minimum Python version
minversion = 3.8

# Test paths
testpaths = tests
