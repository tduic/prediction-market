name: Deploy to GCP

on:
  release:
    types: [published]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  ZONE: ${{ secrets.GCP_ZONE || 'us-central1-a' }}
  VM_NAME: ${{ secrets.GCP_VM_NAME || 'predictor-vm' }}

jobs:
  deploy:
    name: Deploy to GCE
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP ────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ── 3. Build dashboard in CI (avoids Node.js on the VM) ─────────
      - name: Build dashboard
        run: |
          cd dashboard
          npm ci --no-audit --no-fund
          npm run build

      # ── 4. Package code (includes pre-built dashboard/dist) ──────────
      - name: Package code
        run: |
          tar czf /tmp/predictor.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            --exclude='deploy/config.env' \
            .

      # ── 5. Upload to VM ───────────────────────────────────────────────
      - name: Upload to VM
        run: |
          gcloud compute scp /tmp/predictor.tar.gz \
            "$VM_NAME:/tmp/predictor.tar.gz" \
            --zone="$ZONE" \
            --project="$PROJECT_ID" \
            --strict-host-key-checking=no \
            --quiet

      # ── 5. Deploy on VM ───────────────────────────────────────────────
      - name: Deploy on VM
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" \
            --project="$PROJECT_ID" \
            --command="$(cat <<'REMOTE_SCRIPT'
          set -euo pipefail

          APP_DIR="/data/predictor/prediction-market"
          VENV="/data/predictor/venv"

          echo "=== Extracting code ==="
          sudo mkdir -p /tmp/predictor-staging
          sudo tar xzf /tmp/predictor.tar.gz -C /tmp/predictor-staging

          echo "=== Syncing to app directory ==="
          sudo rsync -a --delete \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            --exclude='venv' \
            --exclude='node_modules' \
            /tmp/predictor-staging/ "$APP_DIR/"
          sudo chown -R predictor:predictor "$APP_DIR"

          echo "=== Installing Python dependencies ==="
          sudo -u predictor "$VENV/bin/pip" install --quiet --upgrade pip
          sudo -u predictor "$VENV/bin/pip" install --quiet -r "$APP_DIR/requirements.txt"

          echo "=== Reloading systemd and restarting service ==="
          sudo cp "$APP_DIR/deploy/predictor.service" /etc/systemd/system/predictor.service
          sudo systemctl daemon-reload
          sudo systemctl restart predictor

          echo "=== Waiting for service to stabilize ==="
          sleep 5
          STATUS=$(sudo systemctl is-active predictor || true)
          echo "Service status: $STATUS"

          if [ "$STATUS" != "active" ]; then
            echo "=== Service failed to start — last 30 log lines ==="
            sudo journalctl -u predictor -n 30 --no-pager
            exit 1
          fi

          echo "=== Cleaning up ==="
          sudo rm -rf /tmp/predictor-staging /tmp/predictor.tar.gz

          echo "=== Deploy complete ==="
          REMOTE_SCRIPT
          )"

      # ── 6. Write secrets to VM ──────────────────────────────────────────────
      - name: Write secrets to VM
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 -c "
          import os
          content = (
            'ANTHROPIC_API_KEY=' + os.environ['ANTHROPIC_API_KEY'] + '\n' +
            'GH_TOKEN=' + os.environ['GH_TOKEN'] + '\n' +
            'DISCORD_WEBHOOK_URL=' + os.environ['DISCORD_WEBHOOK_URL'] + '\n'
          )
          open('/tmp/predictor.env', 'w').write(content)
          "
          gcloud compute scp /tmp/predictor.env \
            "$VM_NAME:/tmp/predictor.env" \
            --zone="$ZONE" --project="$PROJECT_ID" --quiet
          gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" --project="$PROJECT_ID" \
            --command="sudo mv /tmp/predictor.env /data/predictor/.env && sudo chown predictor:predictor /data/predictor/.env && sudo chmod 600 /data/predictor/.env"
          rm -f /tmp/predictor.env

      # ── 7. Restore Claude setup ──────────────────────────────────────
      - name: Restore Claude setup on VM
        continue-on-error: true
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" \
            --project="$PROJECT_ID" \
            --command="$(cat <<'REMOTE_SCRIPT'
          # Always run vm-setup.sh when present — it regenerates setup-claude.sh
          # with the latest config and then runs it. Fall back to the existing
          # setup-claude.sh only if vm-setup.sh is absent.
          if [ -f /data/predictor/prediction-market/vm-setup.sh ]; then
            bash /data/predictor/prediction-market/vm-setup.sh
          elif [ -f /data/predictor/setup-claude.sh ]; then
            bash /data/predictor/setup-claude.sh
          else
            echo "No Claude setup script found, skipping."
          fi
          REMOTE_SCRIPT
          )"

      # ── 8. Post-deploy health check ───────────────────────────────────
      - name: Health check
        if: always()
        run: |
          echo "Checking service health..."
          STATUS=$(gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" \
            --project="$PROJECT_ID" \
            --command="sudo systemctl is-active predictor" 2>/dev/null || echo "unknown")

          echo "Service status: $STATUS"
          if [ "$STATUS" != "active" ]; then
            echo "::error::Service is not running after deploy"
            exit 1
          fi

          echo "Deploy successful — service is running."

      # ── 9. Discord notification ───────────────────────────────────────
      - name: Notify Discord (success)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          RELEASE_URL: ${{ github.event.release.html_url || github.server_url }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"content\": \"✅ **${RELEASE_TAG}** deployed to production\\n<${RELEASE_URL}>\"}"

      - name: Notify Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"content\": \"🚨 **${RELEASE_TAG}** deploy FAILED\\n<${RUN_URL}>\"}"
