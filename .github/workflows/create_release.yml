name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.21.0)'
        required: true
      notes:
        description: 'Release notes'
        required: false
        default: 'Automated daily improvements.'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "${{ inputs.tag }}" \
            --notes "${{ inputs.notes }}" \
            --target fd0f7d0d32f933f2639744d8f3df9d4f855ca045
