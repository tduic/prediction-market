name: Restart Analytics

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  ZONE: ${{ secrets.GCP_ZONE || 'us-central1-a' }}
  VM_NAME: ${{ secrets.GCP_VM_NAME || 'predictor-vm' }}

jobs:
  restart-analytics:
    name: Restart Analytics on VM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Check service and refresh status
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" --project="$PROJECT_ID" \
            --command="$(cat <<'REMOTE_SCRIPT'
          echo "=== predictor.service ==="
          sudo systemctl is-active predictor
          echo "=== predictor-refresh.service ==="
          sudo systemctl is-active predictor-refresh || true
          sudo journalctl -u predictor-refresh -n 10 --no-pager || true
          REMOTE_SCRIPT
          )"

      - name: Trigger market refresh (non-blocking)
        run: |
          # Fire the refresh and return immediately — don't wait for it to finish.
          # The matching phase takes 30-90 min depending on market volume.
          # The predictor.service will pick up fresh data on next restart.
          gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" --project="$PROJECT_ID" \
            --command="sudo systemctl start predictor-refresh.service --no-block 2>/dev/null || sudo systemctl restart predictor-refresh.service --no-block 2>/dev/null || true; echo 'Refresh dispatched (running in background on VM)'"

      - name: Take phase0 baseline snapshot
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" --project="$PROJECT_ID" \
            --command="sudo -u predictor /data/predictor/venv/bin/python /data/predictor/prediction-market/scripts/take_baseline.py"

      - name: Restart predictor service
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" --project="$PROJECT_ID" \
            --command="sudo systemctl restart predictor && sleep 10 && sudo systemctl is-active predictor"

      - name: Tail recent logs
        run: |
          gcloud compute ssh "$VM_NAME" \
            --zone="$ZONE" --project="$PROJECT_ID" \
            --command="sudo journalctl -u predictor -n 40 --no-pager"
